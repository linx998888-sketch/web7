<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>我的個人網頁</title>
</head>
<body>

  <h1>我的個人網頁</h1>
  <h2>關於我</h2>
  <h3>個人簡介</h3>
  <h4>興趣</h4>
  <h5>學習目標</h5>
  <h6>聯絡方式</h6>

  <p>
    大家好，我是涂美珠，歡迎來到我的個人網頁。
    <br>
    我喜歡學習網頁設計、活動企劃與創意製作。
  </p>

  <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400" 
       alt="個人照片" width="250">

  <p>
    我的網站連結：
    <a href="https://www.google.com" target="_blank">前往 Google</a>
  </p>

  <hr>

  <h2>我的技能</h2>
  <dir>
    <li>HTML 網頁設計</li>
    <li>CSS 美化版面</li>
    <li>活動海報設計</li>
    <li>簡報製作</li>
  </dir>

  <h2>個人資料表</h2>
  <table border="1" cellpadding="10">
    <tr>
      <th>項目</th>
      <th>內容</th>
    </tr>
    <tr>
      <td>姓名</td>
      <td>涂美珠</td>
    </tr>
    <tr>
      <td>興趣</td>
      <td>網頁設計、創意活動、學習新技能</td>
    </tr>
    <tr>
      <td>目標</td>
      <td>製作自己的個人網站</td>
    </tr>
  </table>

  <hr>

  <h2>聯絡我</h2>
  <form>
    <p>
      姓名：<br>
      <input type="text" name="name">
    </p>

    <p>
      Email：<br>
      <input type="email" name="email">
    </p>

    <p>
      留言內容：<br>
      <textarea name="message" rows="5" cols="30"></textarea>
    </p>

    <input type="submit" value="送出">
    <input type="reset" value="清除">
  </form>

</body>
</html>
